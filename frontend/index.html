<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DENK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #7c5cfc;
      --accent2: #fc5c8a;
      --text: #e8e8f0;
      --muted: #7070a0;
      --border: #2a2a3a;
      --green: #4caf87;
      --red: #fc5c5c;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── AUTH ── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 8px;
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b6bff);
      color: white;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger { background: var(--red); color: white; }
    .btn-success { background: var(--green); color: white; }

    .error-msg {
      background: rgba(252,92,92,0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* ── APP SHELL ── */
    #app-screen { display: none; flex-direction: column; min-height: 100vh; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar .logo { font-size: 1.4rem; margin-bottom: 0; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .plan-tag {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .plan-basic { background: rgba(124,92,252,0.2); color: var(--accent); }
    .plan-premium { background: rgba(252,92,138,0.2); color: var(--accent2); }

    .content { flex: 1; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }

    /* ── NAV ── */
    .nav {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
    }

    .nav-btn {
      flex: 1;
      padding: 14px 8px 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      transition: color 0.2s;
    }

    .nav-btn .icon { font-size: 1.3rem; }
    .nav-btn.active { color: var(--accent); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── LOCATION ── */
    .loc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .loc-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }

    .coords { display: flex; gap: 10px; margin-bottom: 12px; }
    .coords input { flex: 1; }

    /* ── CANDIDATES ── */
    .candidate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .candidate-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .candidate-info p { font-size: 0.78rem; color: var(--muted); }

    .like-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .like-btn:hover { transform: scale(1.1); }

    /* ── MATCHES ── */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .match-card:hover { border-color: var(--accent); }

    .match-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .match-info p { font-size: 0.78rem; color: var(--muted); }

    .unread-badge {
      background: var(--accent2);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* ── CHAT ── */
    #chat-page { display: none; flex-direction: column; height: calc(100vh - 120px); }
    #chat-page.active { display: flex; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .back-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .message.mine {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.theirs {
      align-self: flex-start;
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }

    .message .msg-time {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .chat-input-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    .chat-input-row input:focus { border-color: var(--accent); }

    .send-btn {
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* ── PROFILE ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 12px;
    }

    .profile-card h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .profile-card p { color: var(--muted); font-size: 0.85rem; }

    .stats-row {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }

    .stat-box {
      flex: 1;
      background: var(--surface2);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat-box .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }

    .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }
    .spinner { text-align: center; padding: 30px; color: var(--muted); }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">DENK</div>
    <p class="tagline">Geçmişte kesiştiğin kişileri keşfet</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Giriş Yap</button>
      <button class="tab-btn" onclick="switchTab('register')">Kayıt Ol</button>
    </div>

    <div id="auth-error" class="error-msg"></div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <label>E-posta</label>
        <input id="login-email" type="email" placeholder="ornek@mail.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input id="login-pass" type="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="login()">Giriş Yap</button>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input id="reg-name" type="text" placeholder="Adın" />
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input id="reg-email" type="email" placeholder="ornek@mail.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input id="reg-pass" type="password" placeholder="En az 8 karakter" />
      </div>
      <div class="form-group">
        <label>Doğum Yılı</label>
        <input id="reg-year" type="number" placeholder="2000" min="1900" max="2006" />
      </div>
      <button class="btn btn-primary" onclick="register()">Kayıt Ol</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <div class="topbar">
    <div class="logo">DENK</div>
    <div class="user-badge">
      <span id="topbar-name"></span>
      <span id="topbar-plan" class="plan-tag"></span>
    </div>
  </div>

  <div class="content">
    <!-- TIME TRAVEL -->
    <div id="travel-page" class="page active">
      <div class="section-title">Time Travel</div>
      <div class="loc-card">
        <p>Geçmiş konumunu gir ve kesiştiğin kişileri bul.</p>
        <div class="coords">
          <div class="form-group" style="margin:0">
            <label>Enlem</label>
            <input id="lat" type="number" step="0.0001" placeholder="41.0082" value="41.0082" />
          </div>
          <div class="form-group" style="margin:0">
            <label>Boylam</label>
            <input id="lon" type="number" step="0.0001" placeholder="28.9784" value="28.9784" />
          </div>
        </div>
        <button class="btn btn-secondary" style="margin-bottom:10px" onclick="recordLocation()">Konum Kaydet</button>
        <button class="btn btn-primary" onclick="loadCandidates()">Adayları Getir</button>
      </div>
      <div id="candidates-list"></div>
    </div>

    <!-- MATCHES -->
    <div id="matches-page" class="page">
      <div class="section-title">Eşleşmeler</div>
      <div id="matches-list"></div>
    </div>

    <!-- CHAT -->
    <div id="chat-page" class="page">
      <div class="chat-header">
        <button class="back-btn" onclick="showMatches()">← Geri</button>
        <div class="section-title" id="chat-title" style="margin:0"></div>
      </div>
      <div class="messages-container" id="messages-container"></div>
      <div class="chat-input-row">
        <input id="msg-input" type="text" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile-page" class="page">
      <div class="profile-card">
        <div class="avatar">👤</div>
        <h2 id="profile-name"></h2>
        <p id="profile-email"></p>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="val" id="stat-points">0</div>
          <div class="lbl">DENK Puanı</div>
        </div>
        <div class="stat-box">
          <div class="val" id="stat-plan">-</div>
          <div class="lbl">Plan</div>
        </div>
      </div>
      <button class="btn btn-secondary" style="margin-bottom:10px" onclick="activateGhost()">👻 Ghost Mode (-50 DP)</button>
      <button class="btn btn-danger" onclick="logout()">Çıkış Yap</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('travel-page', this)">
      <span class="icon">🗺️</span>Time Travel
    </button>
    <button class="nav-btn" onclick="showPage('matches-page', this); loadMatches()">
      <span class="icon">💜</span>Eşleşmeler
    </button>
    <button class="nav-btn" onclick="showPage('profile-page', this); loadProfile()">
      <span class="icon">👤</span>Profil
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:8000/api/v1';
let token = localStorage.getItem('denk_token');
let currentUser = JSON.parse(localStorage.getItem('denk_user') || 'null');
let currentMatchId = null;
let currentMatchName = null;
let ws = null;

// ── INIT ──
if (token && currentUser) showApp();

// ── AUTH ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const res = await fetch(`${API}/auth/login`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, password: pass})
  });
  const data = await res.json();
  if (!res.ok) return showError(data.detail || 'Giriş başarısız');
  saveSession(data);
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const birth_year = parseInt(document.getElementById('reg-year').value);

  if (!name || !email || !password) return showError('Tüm alanları doldur');
  if (!email.includes('@') || !email.includes('.')) return showError('Geçerli bir e-posta adresi gir');
  if (password.length < 8) return showError('Şifre en az 8 karakter olmalı');
  if (isNaN(birth_year)) return showError('Geçerli bir doğum yılı gir (örn: 2000)');
  if (2026 - birth_year < 18) return showError('18 yaşından küçükler kayıt olamaz');

  const res = await fetch(`${API}/auth/register`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, email, password, birth_year})
  });
  const data = await res.json();
  if (!res.ok) {
    if (Array.isArray(data.detail)) {
      const fieldErrors = {
        'email': 'Geçerli bir e-posta adresi gir',
        'password': 'Şifre en az 8 karakter olmalı',
        'birth_year': '18 yaşından küçükler kayıt olamaz',
        'name': 'Ad alanı boş bırakılamaz',
      };
      const err = data.detail[0];
      const field = err.loc && err.loc[err.loc.length - 1];
      return showError(fieldErrors[field] || err.msg.split(':')[0]);
    }
    return showError(data.detail || 'Kayıt başarısız');
  }
  saveSession(data);
}

function saveSession(data) {
  token = data.access_token;
  currentUser = data.user;
  localStorage.setItem('denk_token', token);
  localStorage.setItem('denk_user', JSON.stringify(currentUser));
  showApp();
}

function logout() {
  localStorage.clear();
  token = null; currentUser = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── APP ──
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('topbar-name').textContent = currentUser.name;
  const pt = document.getElementById('topbar-plan');
  pt.textContent = currentUser.plan;
  pt.className = `plan-tag plan-${currentUser.plan}`;
}

function showPage(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if (btn) document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ── LOCATION ──
async function recordLocation() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const res = await api('POST', '/location/event', {
    latitude: lat, longitude: lon,
    recorded_at: new Date().toISOString()
  });
  toast(res.message || 'Kaydedildi');
}

async function loadCandidates() {
  const el = document.getElementById('candidates-list');
  el.innerHTML = '<div class="spinner">⏳ Yükleniyor...</div>';
  const data = await api('GET', '/location/candidates');
  if (!Array.isArray(data)) { el.innerHTML = `<div class="empty">${data.detail || 'Hata'}</div>`; return; }
  if (data.length === 0) { el.innerHTML = '<div class="empty">Henüz kesişim bulunamadı.<br>Konum kaydet ve tekrar dene.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="candidate-card">
      <div class="candidate-info">
        <h3>${c.name}</h3>
        <p>📍 ${c.distance_meters}m uzakta • ${fmtTime(c.intersection_at)}</p>
      </div>
      <button class="like-btn" onclick="likeUser('${c.user_id}', this)" title="Beğen">💜</button>
    </div>`).join('');
}

// ── MATCH ──
async function likeUser(userId, btn) {
  btn.disabled = true;
  const res = await api('POST', '/match/like', {target_user_id: userId});
  if (res.matched) { toast('🎉 Match oldunuz!'); btn.textContent = '✓'; }
  else { toast('Beğeni gönderildi'); btn.textContent = '✓'; }
}

async function loadMatches() {
  const el = document.getElementById('matches-list');
  el.innerHTML = '<div class="spinner">⏳</div>';
  const [matches, convs] = await Promise.all([
    api('GET', '/match/list'),
    api('GET', '/chat/conversations'),
  ]);
  if (!Array.isArray(matches) || matches.length === 0) {
    el.innerHTML = '<div class="empty">Henüz eşleşme yok.<br>Time Travel\'dan adayları beğen!</div>'; return;
  }
  const convMap = {};
  if (Array.isArray(convs)) convs.forEach(c => convMap[c.match_id] = c);

  el.innerHTML = matches.map(m => {
    const c = convMap[m.id] || {};
    const unread = c.unread_count || 0;
    const lastMsg = c.last_message ? c.last_message.substring(0, 40) + (c.last_message.length > 40 ? '…' : '') : '';
    return `
    <div class="match-card" onclick="openChat('${m.id}', '${m.other_user_name}')">
      <div class="match-info">
        <h3>${m.other_user_name}</h3>
        <p>${lastMsg || (m.status === 'matched' ? '💬 Sohbet başlat' : '⏳ Bekleniyor')}</p>
      </div>
      ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
    </div>`;
  }).join('');
}

function showMatches() {
  if (ws) { ws.close(); ws = null; }
  showPage('matches-page', null);
  loadMatches();
}

// ── CHAT ──
async function openChat(matchId, name) {
  currentMatchId = matchId;
  currentMatchName = name;
  document.getElementById('chat-title').textContent = name;
  showPage('chat-page', null);
  await loadMessages();
  connectWS();
}

async function loadMessages() {
  const msgs = await api('GET', `/chat/${currentMatchId}/messages`);
  const container = document.getElementById('messages-container');
  if (!Array.isArray(msgs)) { container.innerHTML = '<div class="empty">Mesajlar yüklenemedi</div>'; return; }
  if (msgs.length === 0) { container.innerHTML = '<div class="empty">Henüz mesaj yok.<br>İlk sen yaz!</div>'; return; }
  container.innerHTML = msgs.map(m => renderMsg(m)).join('');
  container.scrollTop = container.scrollHeight;
}

function renderMsg(m) {
  const mine = m.sender_id === currentUser.id;
  return `
    <div class="message ${mine ? 'mine' : 'theirs'}">
      ${m.content}
      <div class="msg-time">${fmtTime(m.created_at)} ${mine && m.is_read ? '✓✓' : ''}</div>
    </div>`;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const msg = await api('POST', `/chat/${currentMatchId}/send`, {content});
  if (msg.id) appendMsg(msg);
}

function appendMsg(m) {
  const container = document.getElementById('messages-container');
  const emptyEl = container.querySelector('.empty');
  if (emptyEl) emptyEl.remove();
  container.insertAdjacentHTML('beforeend', renderMsg(m));
  container.scrollTop = container.scrollHeight;
}

function connectWS() {
  if (ws) ws.close();
  ws = new WebSocket(`ws://localhost:8000/api/v1/chat/ws/${currentMatchId}?token=${token}`);
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    m.sender_id = m.sender_id || '';
    appendMsg(m);
  };
  ws.onerror = () => {};
}

// ── PROFILE ──
async function loadProfile() {
  const data = await api('GET', '/user/me');
  currentUser = data;
  localStorage.setItem('denk_user', JSON.stringify(data));
  document.getElementById('profile-name').textContent = data.name;
  document.getElementById('profile-email').textContent = data.email;
  document.getElementById('stat-points').textContent = data.denk_points;
  document.getElementById('stat-plan').textContent = data.plan;
}

async function activateGhost() {
  const res = await api('POST', '/user/ghost-mode');
  toast(res.message || res.detail || 'Hata');
  loadProfile();
}

// ── UTILS ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  return res.json();
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
