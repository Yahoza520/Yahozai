# /etc/nginx/sites-available/denk
# Semlink: ln -s /etc/nginx/sites-available/denk /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 187.77.95.109;  # Domain alınca: denk.app www.denk.app

    # Frontend (static HTML)
    location / {
        root /var/www/denk;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1m;
    }

    # WebSocket (chat)
    location /api/v1/chat/ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Güvenlik
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gizli dosyaları engelle
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
}

# HTTPS — domain alınınca certbot ile otomatik eklenecek:
# sudo certbot --nginx -d denk.app -d www.denk.app
